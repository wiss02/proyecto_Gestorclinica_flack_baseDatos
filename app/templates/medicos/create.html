{% extends "base.html" %}

{% block title %}Nuevo Médico - Clínica Médica{% endblock %}
{% block page_title %}Nuevo Médico{% endblock %}
{% block page_subtitle %}Registrar un nuevo médico en el sistema{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>👨‍⚕️ Datos del Médico</h2>
    </div>
    <div class="card-body">
        <div class="form-container">
            <form method="POST" action="{{ url_for('medicos.create') }}">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre Completo <span class="required">*</span></label>
                        <input type="text" id="nombre" name="nombre" class="form-control"
                               placeholder="Ej: Dr. Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="especialidad">Especialidad <span class="required">*</span></label>
                        <input type="text" id="especialidad" name="especialidad" class="form-control"
                               placeholder="Ej: Cardiología" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="telefono">Teléfono <span class="required">*</span></label>
                        <input type="tel" id="telefono" name="telefono" class="form-control"
                               placeholder="Ej: +58 412-1234567" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="correo">Correo Electrónico <span class="required">*</span></label>
                        <input type="email" id="correo" name="correo" class="form-control"
                               placeholder="Ej: doctor@clinica.com" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Guardar Médico</button>
                    <a href="{{ url_for('medicos.index') }}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
