{% extends "base.html" %}

{% block title %}Editar Médico - Clínica Médica{% endblock %}
{% block page_title %}Editar Médico{% endblock %}
{% block page_subtitle %}Modificar información de {{ medico.nombre }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>✏️ Editar Médico</h2>
    </div>
    <div class="card-body">
        <div class="form-container">
            <form method="POST" action="{{ url_for('medicos.edit', id=medico.id_medico) }}">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre Completo <span class="required">*</span></label>
                        <input type="text" id="nombre" name="nombre" class="form-control"
                               value="{{ medico.nombre }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="especialidad">Especialidad <span class="required">*</span></label>
                        <input type="text" id="especialidad" name="especialidad" class="form-control"
                               value="{{ medico.especialidad }}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="telefono">Teléfono <span class="required">*</span></label>
                        <input type="tel" id="telefono" name="telefono" class="form-control"
                               value="{{ medico.telefono }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="correo">Correo Electrónico <span class="required">*</span></label>
                        <input type="email" id="correo" name="correo" class="form-control"
                               value="{{ medico.correo }}" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Actualizar Médico</button>
                    <a href="{{ url_for('medicos.index') }}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
