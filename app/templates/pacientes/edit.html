{% extends "base.html" %}

{% block title %}Editar Paciente - Clínica Médica{% endblock %}
{% block page_title %}Editar Paciente{% endblock %}
{% block page_subtitle %}Modificar información de {{ paciente.nombre }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>✏️ Editar Paciente</h2>
    </div>
    <div class="card-body">
        <div class="form-container">
            <form method="POST" action="{{ url_for('pacientes.edit', id=paciente.id_paciente) }}">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre Completo <span class="required">*</span></label>
                        <input type="text" id="nombre" name="nombre" class="form-control"
                               value="{{ paciente.nombre }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="edad">Edad <span class="required">*</span></label>
                        <input type="number" id="edad" name="edad" class="form-control"
                               value="{{ paciente.edad }}" min="0" max="150" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="direccion">Dirección <span class="required">*</span></label>
                    <input type="text" id="direccion" name="direccion" class="form-control"
                           value="{{ paciente.direccion }}" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="telefono">Teléfono <span class="required">*</span></label>
                    <input type="tel" id="telefono" name="telefono" class="form-control"
                           value="{{ paciente.telefono }}" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Actualizar Paciente</button>
                    <a href="{{ url_for('pacientes.index') }}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
