{% extends "base.html" %}

{% block title %}Nuevo Paciente - Clínica Médica{% endblock %}
{% block page_title %}Nuevo Paciente{% endblock %}
{% block page_subtitle %}Registrar un nuevo paciente en el sistema{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h2>🧑‍🤝‍🧑 Datos del Paciente</h2>
    </div>
    <div class="card-body">
        <div class="form-container">
            <form method="POST" action="{{ url_for('pacientes.create') }}">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="nombre">Nombre Completo <span class="required">*</span></label>
                        <input type="text" id="nombre" name="nombre" class="form-control"
                               placeholder="Ej: María García" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="edad">Edad <span class="required">*</span></label>
                        <input type="number" id="edad" name="edad" class="form-control"
                               placeholder="Ej: 35" min="0" max="150" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="direccion">Dirección <span class="required">*</span></label>
                    <input type="text" id="direccion" name="direccion" class="form-control"
                           placeholder="Ej: Av. Principal #123, Ciudad" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="telefono">Teléfono <span class="required">*</span></label>
                    <input type="tel" id="telefono" name="telefono" class="form-control"
                           placeholder="Ej: +58 412-1234567" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">💾 Guardar Paciente</button>
                    <a href="{{ url_for('pacientes.index') }}" class="btn btn-outline">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
