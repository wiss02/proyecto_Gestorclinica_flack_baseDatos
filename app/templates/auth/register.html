{% extends "base.html" %}

{% block title %}Registrarse - Clínica Médica{% endblock %}

{% block content_auth %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">📝</div>
            <h1>Crear Cuenta</h1>
            <p>Regístrate para acceder al sistema</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label class="form-label" for="username">Usuario <span class="required">*</span></label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Elige un nombre de usuario" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña <span class="required">*</span></label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Mínimo 4 caracteres" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirmar Contraseña <span class="required">*</span></label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                       placeholder="Repite tu contraseña" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 8px;">
                Crear Cuenta
            </button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión aquí</a>
        </div>
    </div>
</div>
{% endblock %}
