{% extends "base.html" %}

{% block title %}Iniciar Sesión - Clínica Médica{% endblock %}

{% block content_auth %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🏥</div>
            <h1>Bienvenido</h1>
            <p>Inicia sesión para acceder al sistema</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label class="form-label" for="username">Usuario <span class="required">*</span></label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Ingresa tu usuario" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña <span class="required">*</span></label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Ingresa tu contraseña" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                Iniciar Sesión
            </button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="{{ url_for('auth.register') }}">Regístrate aquí</a>
        </div>
    </div>
</div>
{% endblock %}
